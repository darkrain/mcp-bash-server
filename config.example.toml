[server]
host = "0.0.0.0"
port = 8080
base_url = "/mcp"
# api_key = "change-me-to-min-16-chars"

[bash]
# БЕЗОПАСНЫЙ ВАРИАНТ: только разрешённые команды
# Рекомендуется для продакшена
allowed_commands = ["ls", "cat", "ps", "df", "echo", "pwd", "uptime"]

# ОПАСНЫЙ ВАРИАНТ: разрешить ВСЕ команды (wildcard)
# ⚠️ ВНИМАНИЕ: Только для доверенных окружений!
# allowed_commands = ["*"]

timeout = 30
max_output_size = 1048576

# Логирование всех выполненных команд (аналог bash history)
# По умолчанию: true
log_commands = true

[log]
level = "info"
format = "json"
output = "stderr"
